project:
  type: book
  output-dir: _book

book:
  title: "Accounting Analytics with Python"
  subtitle: "Analytics Powered by Large Language Models (LLM)"
  author: "Sharif Islam, DBA, CPA, CMA"
  downloads: [pdf, epub] 
  date: today
  repo-url: https://github.com/msharifbd/accounting-analytics-book
  repo-actions: [edit, source, issue]
  page-footer:
    left: "Accounting Analytics with Python"
    right: "This book was built with [Quarto](https://quarto.org/)"
  chapters:
    - index.qmd
    - part: "Part I: Foundations"
      chapters:
        - 01-introduction-to-accounting-analytics.qmd
        - 02-python-quarto-setup.qmd
        - 03-data-fundamentals.qmd
    - part: "Part II: Core Data Skills"
      chapters:
        - 04-data-wrangling-pandas.qmd
        - 05-exploratory-data-analysis.qmd
        - 06-data-visualization.qmd
    - part: "Part III: Applied Accounting Analytics"
      chapters:
        - 07-financial-statement-analysis.qmd
        - 08-management-accounting-analytics.qmd
        - 09-audit-analytics.qmd
        - 10-fraud-anomaly-detection.qmd
        - 11-revenue-recognition-analysis.qmd
        - 12-tax-analytics.qmd
    - part: "Part IV: Predictive Methods and GenAI"
      chapters:
        - 13-predictive-modeling-intro.qmd
        - 14-genai-in-accounting.qmd
    - part: "Part V: Communication and Capstone"
      chapters:
        - 15-automated-reporting-quarto.qmd
        - 16-data-ethics-reproducibility.qmd
        - 17-capstone-project.qmd
    - references.qmd
  appendices:
    - appendix-a-python-primer.qmd
    - appendix-b-financial-statement-basics.qmd
    - appendix-c-edgar-database.qmd


bibliography: references.bib

format:
  html:
    theme: 
      light: cosmo
      dark: slate 
    include-in-header:
      text: |
        <style>
        .scrollable-table {
          overflow-x: auto !important;
        }
        .scrollable-table table {
          width: max-content !important;
          max-width: none !important;
        }
        a.citation, a.citation:visited {
          color: #1a56db !important;
        }
        #refs a {
          color: #1a56db !important;
        }
        </style>
    number-sections: true
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: false
    
  pdf:
    documentclass: scrbook
    classoption: ["fontsize=13pt", "extrafontsizes"]
    geometry:
      - margin=1in
    toc: true
    number-sections: true
    colorlinks: true
    citecolor: blue
    linkcolor: blue
    urlcolor: blue
    cite-method: natbib
    natbiboptions: round
    fig-pos: "H"
    pdf-engine: xelatex
    mainfont: "EB Garamond"
    include-in-header: preamble.tex

  epub: 
    cover-image: images/Front-page-image.png
        

execute:
  freeze: auto
  warning: false
